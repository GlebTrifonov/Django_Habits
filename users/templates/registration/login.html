{% extends 'base.html' %}

{% block content %}
    <div class="max-w-md mx-auto bg-white p-8 rounded-2xl border border-gray-200 shadow-sm mt-10">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
        {% block form_title %}Действие{% endblock %}
    </h2>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full py-3 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-700 transition shadow-indigo-200 shadow-lg">
            Подтвердить
        </button>
    </form>
    
    <div class="mt-6 text-center text-sm text-gray-500">
        <a href="{% url 'habit_list' %}" class="hover:text-indigo-600 underline">Вернуться назад</a>
    </div>
</div>
{% endblock %}
